name: Build WinTextCleaner for Windows

on:
  push:
    paths:
      - 'WinTextCleaner/**'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    defaults:
      run:
        working-directory: WinTextCleaner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'WinTextCleaner/package-lock.json'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'WinTextCleaner/src-tauri -> target'

      - name: Install Node dependencies
        run: npm install

      # Regola globale utente: Always run `cargo clean` before `npm run tauri:build`
      - name: Clean Rust build (User Rule)
        run: cargo clean
        working-directory: WinTextCleaner/src-tauri

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: WinTextCleaner-Windows-EXE
          path: |
            WinTextCleaner/src-tauri/target/release/bundle/nsis/*.exe
            WinTextCleaner/src-tauri/target/release/bundle/msi/*.msi
            WinTextCleaner/src-tauri/target/release/*.exe
          retention-days: 7
