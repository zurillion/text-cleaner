name: TextCleaner
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"

targets:
  TextCleaner:
    type: application
    platform: macOS
    sources:
      - path: TextCleaner
        excludes:
          - "Info.plist"
          - "*.entitlements"
    info:
      path: TextCleaner/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.TextCleaner
        PRODUCT_NAME: TextCleaner
        INFOPLIST_FILE: TextCleaner/Info.plist
        CODE_SIGN_ENTITLEMENTS: TextCleaner/TextCleaner.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
